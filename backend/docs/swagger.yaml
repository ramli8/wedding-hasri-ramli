basePath: /v1
definitions:
  internal_auth.AdminUpdateUserRequest:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      is_active:
        type: boolean
      name:
        minLength: 2
        type: string
      role_ids:
        items:
          type: integer
        type: array
    type: object
  internal_auth.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/internal_auth.UserResponse'
    type: object
  internal_auth.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  internal_auth.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
      role_ids:
        items:
          type: integer
        type: array
    required:
    - email
    - name
    - password
    type: object
  internal_auth.GoogleOAuthRequest:
    properties:
      id_token:
        type: string
    required:
    - id_token
    type: object
  internal_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_auth.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  internal_auth.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      name:
        minLength: 2
        type: string
    type: object
  internal_auth.UserListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_auth.UserResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_auth.UserResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified:
        type: boolean
      id:
        type: string
      is_active:
        type: boolean
      is_oauth:
        type: boolean
      name:
        type: string
      oauth_provider:
        type: string
      permissions:
        items:
          type: string
        type: array
      roles:
        items:
          type: string
        type: array
    type: object
  internal_guest.CreateGuestCategoryRequest:
    properties:
      end_time:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      start_time:
        type: string
    required:
    - name
    type: object
  internal_guest.CreateGuestRequest:
    properties:
      address:
        type: string
      guest_category_id:
        type: integer
      instagram_username:
        maxLength: 50
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      note:
        type: string
      phone_number:
        maxLength: 20
        type: string
    required:
    - guest_category_id
    - name
    type: object
  internal_guest.GuestCategoryListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_guest.GuestCategoryResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_guest.GuestCategoryResponse:
    properties:
      created_at:
        type: string
      end_time:
        type: string
      id:
        type: integer
      name:
        type: string
      start_time:
        type: string
      updated_at:
        type: string
    type: object
  internal_guest.GuestListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_guest.GuestResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  internal_guest.GuestResponse:
    properties:
      address:
        type: string
      category_name:
        type: string
      check_in_at:
        type: string
      check_out_at:
        type: string
      created_at:
        type: string
      guest_category_id:
        type: integer
      id:
        type: string
      instagram_username:
        type: string
      name:
        type: string
      note:
        type: string
      phone_number:
        type: string
      qr_code:
        type: string
      status_attending:
        type: string
      status_sent:
        type: string
      updated_at:
        type: string
    type: object
  internal_guest.UpdateGuestCategoryRequest:
    properties:
      end_time:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      start_time:
        type: string
    type: object
  internal_guest.UpdateGuestRequest:
    properties:
      address:
        type: string
      check_in_at:
        type: string
      check_out_at:
        type: string
      guest_category_id:
        type: integer
      instagram_username:
        maxLength: 50
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      note:
        type: string
      phone_number:
        maxLength: 20
        type: string
      status_attending:
        enum:
        - pending
        - going
        - not_going
        type: string
      status_sent:
        enum:
        - pending
        - sent
        type: string
    type: object
  internal_rbac.AssignPermissionsToRoleRequest:
    properties:
      permission_ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - permission_ids
    type: object
  internal_rbac.AssignRolesToUserRequest:
    properties:
      role_ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - role_ids
    type: object
  internal_rbac.CheckModuleAccessRequest:
    properties:
      action:
        enum:
        - view
        - create
        - edit
        - delete
        type: string
      module:
        type: string
    required:
    - action
    - module
    type: object
  internal_rbac.CheckModuleAccessResponse:
    properties:
      has_access:
        type: boolean
    type: object
  internal_rbac.CheckPermissionRequest:
    properties:
      permission:
        type: string
    required:
    - permission
    type: object
  internal_rbac.CheckPermissionResponse:
    properties:
      has_permission:
        type: boolean
    type: object
  internal_rbac.CreatePermissionRequest:
    properties:
      description:
        type: string
      module:
        maxLength: 100
        minLength: 2
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - module
    - name
    type: object
  internal_rbac.CreateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  internal_rbac.ModuleAccessResponse:
    properties:
      can_create:
        type: boolean
      can_delete:
        type: boolean
      can_edit:
        type: boolean
      can_view:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      module_name:
        type: string
      role_id:
        type: integer
      updated_at:
        type: string
    type: object
  internal_rbac.PermissionResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      module:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  internal_rbac.PermissionsByModuleResponse:
    properties:
      module:
        type: string
      permissions:
        items:
          $ref: '#/definitions/internal_rbac.PermissionResponse'
        type: array
    type: object
  internal_rbac.RoleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_system:
        type: boolean
      name:
        type: string
      updated_at:
        type: string
    type: object
  internal_rbac.UpdateModuleAccessRequest:
    properties:
      can_create:
        type: boolean
      can_delete:
        type: boolean
      can_edit:
        type: boolean
      can_view:
        type: boolean
      module_name:
        type: string
    required:
    - module_name
    type: object
  internal_rbac.UpdatePermissionRequest:
    properties:
      description:
        type: string
      module:
        maxLength: 100
        minLength: 2
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  internal_rbac.UpdateRoleRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  internal_rbac.UserRoleResponse:
    properties:
      roles:
        items:
          $ref: '#/definitions/internal_rbac.RoleResponse'
        type: array
      user_email:
        type: string
      user_id:
        type: string
      user_name:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is GNS Backend API server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: GNS Backend API
  version: "1.0"
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change the password for the currently logged-in user
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change user password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to get JWT token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the current user and invalidate tokens
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/oauth/google:
    post:
      consumes:
      - application/json
      description: Login using Google OAuth ID Token
      parameters:
      - description: Google OAuth request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.GoogleOAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid Google token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login with Google
      tags:
      - Auth
  /auth/profile:
    get:
      consumes:
      - application/json
      description: Get the profile of the currently logged-in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.UserResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - Auth
    put:
      consumes:
      - application/json
      description: Update the profile information for the current user
      parameters:
      - description: Update profile request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.UserResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a refresh token
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid refresh token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_auth.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: User already exists
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Auth
  /guests:
    get:
      consumes:
      - application/json
      description: Get a paginated list of guests with filters
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Search by name or QR code
        in: query
        name: search
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: integer
      - description: Filter by attending status
        in: query
        name: status_attending
        type: string
      - description: Filter by sent status
        in: query
        name: status_sent
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_guest.GuestListResponse'
      summary: List all guests
      tags:
      - Guest
    post:
      consumes:
      - application/json
      description: Create a new guest with auto-generated unique QR code
      parameters:
      - description: Create guest request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_guest.CreateGuestRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_guest.GuestResponse'
        "400":
          description: Invalid request body or validation failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new guest
      tags:
      - Guest
  /guests/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a guest by its ID
      parameters:
      - description: Guest ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Guest deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Guest not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete guest
      tags:
      - Guest
    get:
      consumes:
      - application/json
      description: Get a single guest by its ID
      parameters:
      - description: Guest ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_guest.GuestResponse'
        "404":
          description: Guest not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get guest by ID
      tags:
      - Guest
    put:
      consumes:
      - application/json
      description: Update an existing guest's information
      parameters:
      - description: Guest ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update guest request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_guest.UpdateGuestRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_guest.GuestResponse'
        "400":
          description: Invalid request body or validation failed
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Guest not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update guest
      tags:
      - Guest
  /guests/categories:
    get:
      consumes:
      - application/json
      description: Get a paginated list of guest categories with optional search
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: page_size
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_guest.GuestCategoryListResponse'
      summary: List all guest categories
      tags:
      - Guest
    post:
      consumes:
      - application/json
      description: Create a new guest category with name and optional start/end times
      parameters:
      - description: Create guest category request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_guest.CreateGuestCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_guest.GuestCategoryResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Category already exists
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new guest category
      tags:
      - Guest
  /guests/categories/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a guest category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Category deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Category not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete guest category
      tags:
      - Guest
    get:
      consumes:
      - application/json
      description: Get a single guest category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_guest.GuestCategoryResponse'
        "404":
          description: Category not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get guest category by ID
      tags:
      - Guest
    put:
      consumes:
      - application/json
      description: Update an existing guest category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update guest category request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_guest.UpdateGuestCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_guest.GuestCategoryResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Category not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update guest category
      tags:
      - Guest
  /rbac/check-module-access:
    post:
      consumes:
      - application/json
      description: Check if the user has access to a specific action on a module
      parameters:
      - description: Check module access request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rbac.CheckModuleAccessRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_rbac.CheckModuleAccessResponse'
      security:
      - BearerAuth: []
      summary: Check module access
      tags:
      - RBAC - Permission Checking
  /rbac/check-permission:
    post:
      consumes:
      - application/json
      description: Check if the currently logged-in user has a specific permission
      parameters:
      - description: Check permission request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rbac.CheckPermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_rbac.CheckPermissionResponse'
      security:
      - BearerAuth: []
      summary: Check user permission
      tags:
      - RBAC - Permission Checking
  /rbac/permissions:
    get:
      consumes:
      - application/json
      description: Get a list of all existing permissions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_rbac.PermissionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get all permissions
      tags:
      - RBAC - Permissions
    post:
      consumes:
      - application/json
      description: Create a new permission for a module
      parameters:
      - description: Create permission request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_rbac.CreatePermissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_rbac.PermissionResponse'
      security:
      - BearerAuth: []
      summary: Create permission
      tags:
      - RBAC - Permissions
  /rbac/permissions/{id}:
    delete:
      consumes:
      - application/json
      description: Permanently delete a permission
      parameters:
      - description: Permission ID
        in: path
        name: id
